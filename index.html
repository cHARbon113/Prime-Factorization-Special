<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>素因数分解・特級</title>
    <style>
        * { 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        body { margin: 0; padding: 0; background: #ffffff; color: #000000; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .game-wrapper { width: 100%; max-width: 380px; padding: 20px; display: flex; flex-direction: column; height: 100vh; justify-content: space-between; }
        
        .header-area { margin-top: 15px; width: 100%; }
        .progress { font-size: 1.1rem; text-align: right; color: #666; margin-bottom: 5px; font-weight: 600; }
        
        .problem-container { background: #ffffff; color: #000000; border: 2.5px solid #000; border-radius: 12px; padding: 25px 15px; text-align: center; min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }
        
        .sub-display { font-size: 1.4rem; color: #666666; min-height: 2rem; margin-bottom: 10px; letter-spacing: 1px; font-weight: 500; }
        .main-display { font-size: 4.5rem; letter-spacing: 1px; line-height: 1.1; font-weight: 600; }
        
        .ready-mode .main-display { font-size: 2.2rem; }
        .skipped-mode .main-display { font-size: 3.2rem; }
        
        /* 入力欄 */
        .input-box { font-size: 3.2rem; text-align: center; margin: 10px 0 15px 0; letter-spacing: 6px; border-bottom: 2.5px solid #ccc; padding-bottom: 3px; color: #000; font-weight: 600; }
        
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0px; width: 100%; border-top: 1.5px solid #000; border-left: 1.5px solid #000; }
        
        .btn { background: #ffffff; color: #000000; border: 1.5px solid #000000; padding: 22px 0; font-size: 1.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 100%; outline: none; font-weight: 600; }
        .btn-action { background: #dcdcdc; color: #000000; }
        
        .btn:active { background: #000000; color: #ffffff; }
        .btn-action:active { background: #888888; color: #ffffff; }
        
        /* アニメーション */
        .pop-anime { animation: pop 0.12s ease-out; }
        @keyframes pop {
            0% { transform: scale(0.96); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1.0); }
        }
        
        .correct-anime { animation: correct-bounce 0.25s ease-out; }
        @keyframes correct-bounce {
            0% { transform: scale(1.0); }
            40% { transform: scale(1.04); }
            100% { transform: scale(1.0); }
        }
        
        /* 正解時の緑フラッシュ */
        .flash-anime { animation: input-flash 0.15s ease-out; }
        @keyframes input-flash {
            0% { opacity: 0.3; transform: scale(0.95); color: #00dd00; }
            100% { opacity: 1; transform: scale(1.0); color: #000000; }
        }
        
        /* 🚀 【新規】不正解時の赤フラッシュ＆シェイク（横揺れ） */
        .wrong-anime { animation: wrong-shake 0.2s ease-in-out; }
        @keyframes wrong-shake {
            0% { transform: translateX(0); color: #ff0000; }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(4px); }
            100% { transform: translateX(0); color: #000000; }
        }
        
        /* リザルト用スタイル */
        .result-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; z-index: 10; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .accuracy-display { font-size: 2.0rem; font-weight: 600; color: #000; margin-bottom: 5px; }
        .time-display { font-size: 1.8rem; font-weight: 600; color: #444; margin-bottom: 25px; }
        .new-record-title { font-size: 2.0rem; font-weight: 600; color: #000; margin-bottom: 15px; letter-spacing: 0.5px; }
        .huge-score-box { font-size: 2.6rem; font-weight: 600; color: #000; margin: 12px 0; line-height: 1.2; }
        .huge-score-box span { font-size: 1.2rem; color: #666; font-weight: 500; display: block; margin-bottom: 2px; }
        .record-transition { margin: 20px 0; font-weight: 500; color: #333; display: flex; align-items: flex-end; justify-content: center; gap: 8px; }
        .old-score { font-size: 1.3rem; color: #666; padding-bottom: 3px; }
        .new-score { font-size: 2.6rem; font-weight: 600; color: #000; }
    </style>
</head>
<body>

<div class="game-wrapper" id="game-view">
    <div class="header-area">
        <div class="progress"><span id="q-num">1</span> / 10</div>
        <div class="problem-container ready-mode" id="problem-box">
            <div class="sub-display" id="display-sub"></div>
            <div class="main-display" id="display-main">PRESS P</div>
        </div>
    </div>
    
    <div>
        <div class="input-box" id="display-input">00</div>
        
        <div class="keypad" id="keyboard">
            <button class="btn btn-action" data-action="back">◀︎</button>
            <button class="btn btn-action" data-action="comma">,</button>
            <button class="btn btn-action" data-action="p">P</button>

            <button class="btn" data-action="7">7</button>
            <button class="btn" data-action="8">8</button>
            <button class="btn" data-action="9">9</button>

            <button class="btn" data-action="4">4</button>
            <button class="btn" data-action="5">5</button>
            <button class="btn" data-action="6">6</button>

            <button class="btn" data-action="1">1</button>
            <button class="btn" data-action="2">2</button>
            <button class="btn" data-action="3">3</button>
        </div>
    </div>
</div>

<div class="result-screen" id="result-view">
    <div class="accuracy-display" id="result-accuracy">0%</div>
    <div class="time-display" id="result-time">00:00.00</div>
    <div id="result-content-area" style="width: 100%;"></div>
    <button class="btn" style="width: 200px; margin-top: 40px; border: 2px solid #000; border-radius: 8px;" id="btn-restart">RETRY</button>
</div>

<script>
const questionBank = [
    { number: 1769, p: 29, q: 61 },
    { number: 1457, p: 31, q: 47 },
    { number: 2491, p: 47, q: 53 },
    { number: 4087, p: 61, q: 67 },
    { number: 2173, p: 41, q: 53 }
];

let gameQuestions = [];
let currentIdx = 0;
let totalScore = 0;
let correctCount = 0; 
let currentPot = 10000;
let timerInterval;
let inputDigits = ['0', '0'];
let pressCount = 0;

let isGameStarted = false; 
let isWaitingNext = false;  
let isSkipped = false; 
let remainingFactor = null;

let startTime = 0;
let endTime = 0;

const keyboard = document.getElementById('keyboard');
const problemBox = document.getElementById('problem-box');
const inputDisplay = document.getElementById('display-input');
const startEvent = ('ontouchstart' in window) ? 'touchstart' : 'mousedown';

keyboard.addEventListener(startEvent, function(e) {
    const target = e.target.closest('button');
    if (!target) return;
    
    e.preventDefault();
    
    target.classList.remove('pop-anime');
    void target.offsetWidth;
    target.classList.add('pop-anime');
    
    const action = target.getAttribute('data-action');
    if (!action) return;
    
    if (action === 'back') pressBack();
    else if (action === 'comma') pressComma();
    else if (action === 'p') pressP();
    else pressNum(action);
});

keyboard.addEventListener('animationend', function(e) {
    if (e.target.tagName === 'BUTTON') {
        e.target.classList.remove('pop-anime');
    }
});

// クリーニング対象に wrong-anime も追加
problemBox.addEventListener('animationend', () => problemBox.classList.remove('correct-anime'));
inputDisplay.addEventListener('animationend', () => {
    inputDisplay.classList.remove('flash-anime');
    inputDisplay.classList.remove('wrong-anime');
});

document.getElementById('btn-restart').addEventListener(startEvent, function(e) {
    e.preventDefault();
    const target = e.target;
    target.classList.remove('pop-anime');
    void target.offsetWidth;
    target.classList.add('pop-anime');
    setTimeout(restartGame, 100);
});

function initGame() {
    gameQuestions = [...questionBank].sort(() => 0.5 - Math.random()).slice(0, 10);
    currentIdx = 0;
    totalScore = 0;
    correctCount = 0;
    isGameStarted = false;
    isWaitingNext = false;
    isSkipped = false;
    inputDigits = ['0', '0'];
    pressCount = 0;
    remainingFactor = null;
    
    document.getElementById('q-num').innerText = "1";
    document.getElementById('display-sub').innerText = "";
    document.getElementById('display-main').innerText = "PRESS P";
    
    problemBox.className = "problem-container ready-mode";
    updateInputDisplay();
}

function startFirstQuestion() {
    isGameStarted = true;
    startTime = performance.now();
    showQuestion();
}

function showQuestion() {
    if (currentIdx >= gameQuestions.length) {
        endTime = performance.now();
        clearInterval(timerInterval);
        showResult();
        return;
    }
    
    isWaitingNext = false;
    isSkipped = false;
    inputDigits = ['0', '0'];
    pressCount = 0;
    remainingFactor = null;
    document.getElementById('q-num').innerText = currentIdx + 1;
    
    problemBox.className = "problem-container";
    
    const currentQ = gameQuestions[currentIdx];
    document.getElementById('display-sub').innerText = currentQ.number;
    document.getElementById('display-main').innerText = currentQ.number;
    
    updateInputDisplay();
    
    currentPot = 10000;
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        if (currentPot > 1000) {
            currentPot -= 25; 
        }
    }, 50);
}

function updateInputDisplay() {
    inputDisplay.innerText = inputDigits.join('');
}

function triggerCorrectEffects() {
    problemBox.classList.remove('correct-anime');
    void problemBox.offsetWidth;
    problemBox.classList.add('correct-anime');

    inputDisplay.classList.remove('flash-anime', 'wrong-anime');
    void inputDisplay.offsetWidth;
    inputDisplay.classList.add('flash-anime');
}

// 🚀 【新規】間違えた時の赤いフラッシュ＆シェイク演出を発火
function triggerWrongEffects() {
    inputDisplay.classList.remove('flash-anime', 'wrong-anime');
    void inputDisplay.offsetWidth; // リフロー
    inputDisplay.classList.add('wrong-anime');
}

function pressNum(numStr) {
    if (!isGameStarted) return;

    inputDigits = [inputDigits[1], numStr];
    pressCount++;
    updateInputDisplay();

    if (pressCount >= 2) {
        if (isWaitingNext) {
            checkAnswerB();
        } else {
            checkAnswerA();
        }
    }
}

function pressComma() {
    if (!isGameStarted) return;

    if (inputDigits[1] === ',') {
        triggerPass();
        return;
    }

    inputDigits = [inputDigits[1], ','];
    pressCount++;
    updateInputDisplay();

    if (inputDigits[0] === ',' && inputDigits[1] === ',') {
        triggerPass();
    }
}

function triggerPass() {
    if (isWaitingNext) {
        currentIdx++;
        showQuestion();
        return;
    }

    inputDigits = ['0', '0'];
    pressCount = 0;
    updateInputDisplay();
    triggerCorrectEffects();

    const currentQ = gameQuestions[currentIdx];
    document.getElementById('display-sub').innerText = `${currentQ.number} =`;
    document.getElementById('display-main').innerText = `${currentQ.p} × ${currentQ.q}`;
    
    problemBox.className = "problem-container skipped-mode";
    
    isWaitingNext = true;
    isSkipped = true;
}

function checkAnswerA() {
    if (inputDigits[0] !== ',' && inputDigits[1] !== ',') {
        const playerAns = parseInt(inputDigits.join(''));
        const currentQ = gameQuestions[currentIdx];
        
        if (playerAns === currentQ.p || playerAns === currentQ.q) {
            totalScore += currentPot;
            remainingFactor = (playerAns === currentQ.p) ? currentQ.q : currentQ.p;
            
            document.getElementById('display-sub').innerText = `${currentQ.number} = ${playerAns} ×`;
            document.getElementById('display-main').innerText = remainingFactor;
            
            problemBox.className = "problem-container";
            
            triggerCorrectEffects();
            isWaitingNext = true;
            
            inputDigits = ['0', '0'];
            pressCount = 0;
            updateInputDisplay(); 
        } else {
            // 🚀 不正解時の処理：演出を出し、入力をリセット
            triggerWrongEffects();
            inputDigits = ['0', '0'];
            pressCount = 0;
            updateInputDisplay();
        }
    }
}

function checkAnswerB() {
    if (isSkipped) return;

    if (inputDigits[0] !== ',' && inputDigits[1] !== ',') {
        const playerAns = parseInt(inputDigits.join(''));
        
        if (playerAns === remainingFactor) {
            correctCount++; 
            triggerCorrectEffects();
            currentIdx++;
            setTimeout(showQuestion, 80);
        } else {
            // 🚀 不正解時の処理：演出を出し、入力をリセット
            triggerWrongEffects();
            inputDigits = ['0', '0'];
            pressCount = 0;
            updateInputDisplay();
        }
    }
}

function pressBack() {
    if (!isGameStarted) return;
    inputDigits = ['0', inputDigits[0]];
    if (pressCount > 0) pressCount--;
    updateInputDisplay();
}

function pressP() {
    if (!isGameStarted) {
        startFirstQuestion();
        return;
    }

    if (isWaitingNext) {
        triggerCorrectEffects();
        currentIdx++;
        setTimeout(showQuestion, 80);
    }
}

function formatClearTime(ms) {
    const totalSeconds = ms / 1000;
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = Math.floor(totalSeconds % 60);
    const milliseconds = Math.floor((ms % 1000) / 10);
    return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${String(milliseconds).padStart(2, '0')}`;
}

function showResult() {
    document.getElementById('game-view').style.display = "none";
    document.getElementById('result-view').style.display = "flex";
    
    const accuracy = (correctCount / gameQuestions.length) * 100;
    document.getElementById('result-accuracy').innerText = `${accuracy}%`;
    
    const clearTimeMs = endTime - startTime;
    document.getElementById('result-time').innerText = formatClearTime(clearTimeMs);
    
    const oldHighScore = parseInt(localStorage.getItem('prime_high_score') || 0);
    const contentArea = document.getElementById('result-content-area');
    
    if (totalScore > oldHighScore) {
        localStorage.setItem('prime_high_score', totalScore);
        contentArea.innerHTML = `
            <div class="new-record-title">ハイスコアを更新！</div>
            <div class="record-transition">
                <span class="old-score">${oldHighScore.toLocaleString()} →</span>
                <span class="new-score">${totalScore.toLocaleString()}</span>
            </div>
        `;
    } else {
        contentArea.innerHTML = `
            <div class="huge-score-box"><span>SCORE</span>${totalScore.toLocaleString()}</div>
            <div class="huge-score-box" style="color: #666;"><span>HIGH SCORE</span>${oldHighScore.toLocaleString()}</div>
        `;
    }
}

function restartGame() {
    document.getElementById('result-view').style.display = "none";
    document.getElementById('game-view').style.display = "flex";
    initGame();
}

initGame();
</script>
</body>
</html>
