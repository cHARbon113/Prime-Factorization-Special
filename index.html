<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>素因数分解・特級</title>
    <style>
        * { 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        body { margin: 0; padding: 0; background: #ffffff; color: #000000; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .game-wrapper { width: 100%; max-width: 380px; padding: 20px; display: flex; flex-direction: column; height: 100vh; justify-content: space-between; }
        
        .header-area { margin-top: 15px; width: 100%; }
        .progress { font-size: 1.1rem; text-align: right; color: #666; margin-bottom: 5px; }
        
        /* お題コンテナ */
        .problem-container { background: #ffffff; color: #000000; border: 2px solid #000; border-radius: 12px; padding: 25px 15px; text-align: center; min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }
        
        .sub-display { font-size: 1.4rem; color: #666666; min-height: 2rem; margin-bottom: 10px; letter-spacing: 1px; }
        .main-display { font-size: 4.5rem; font-weight: normal; letter-spacing: 1px; line-height: 1.1; }
        
        .ready-mode .main-display { font-size: 2.2rem; }
        .skipped-mode .main-display { font-size: 3.2rem; }
        
        /* 入力欄 */
        .input-box { font-size: 3.2rem; text-align: center; margin: 10px 0 15px 0; letter-spacing: 6px; border-bottom: 2px solid #ccc; padding-bottom: 3px; color: #000; transition: transform 0.1s ease; }
        
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0px; width: 100%; border-top: 1px solid #000; border-left: 1px solid #000; }
        
        .btn { background: #ffffff; color: #000000; border: 1px solid #000000; padding: 22px 0; font-size: 1.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 100%; outline: none; }
        .btn-action { background: #dcdcdc; color: #000000; }
        
        .btn:active { background: #000000; color: #ffffff; }
        .btn-action:active { background: #888888; color: #ffffff; }
        
        /* 🚀 演出用アニメーション群 */
        .pop-anime { animation: pop 0.12s ease-out; }
        @keyframes pop {
            0% { transform: scale(0.96); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1.0); }
        }
        
        /* 正解時のお題箱バウンド */
        .correct-anime { animation: correct-bounce 0.25s ease-out; }
        @keyframes correct-bounce {
            0% { transform: scale(1.0); }
            40% { transform: scale(1.04); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
            100% { transform: scale(1.0); box-shadow: 0 0px 0px rgba(0,0,0,0); }
        }
        
        /* 正解時の入力欄フラッシュ */
        .flash-anime { animation: input-flash 0.15s ease-out; }
        @keyframes input-flash {
            0% { opacity: 0.3; transform: scale(0.95); color: #00dd00; }
            100% { opacity: 1; transform: scale(1.0); color: #000000; }
        }
        
        /* リザルト画面 */
        .result-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; z-index: 10; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .score-display { font-size: 1.6rem; margin: 15px 0; color: #333; }
        .score-val { font-size: 3rem; display: block; margin-top: 10px; font-weight: bold; color: #000; }
    </style>
</head>
<body>

<div class="game-wrapper" id="game-view">
    <div class="header-area">
        <div class="progress"><span id="q-num">1</span> / 10</div>
        <div class="problem-container ready-mode" id="problem-box">
            <div class="sub-display" id="display-sub"></div>
            <div class="main-display" id="display-main">PRESS P</div>
        </div>
    </div>
    
    <div>
        <div class="input-box" id="display-input">00</div>
        
        <div class="keypad" id="keyboard">
            <button class="btn btn-action" data-action="back">◀︎</button>
            <button class="btn btn-action" data-action="comma">,</button>
            <button class="btn btn-action" data-action="p">P</button>

            <button class="btn" data-action="7">7</button>
            <button class="btn" data-action="8">8</button>
            <button class="btn" data-action="9">9</button>

            <button class="btn" data-action="4">4</button>
            <button class="btn" data-action="5">5</button>
            <button class="btn" data-action="6">6</button>

            <button class="btn" data-action="1">1</button>
            <button class="btn" data-action="2">2</button>
            <button class="btn" data-action="3">3</button>
        </div>
    </div>
</div>

<div class="result-screen" id="result-view">
    <div class="score-display">YOUR SCORE<span class="score-val" id="final-score">0</span></div>
    <div class="score-display" style="color: #666;">HIGH SCORE<span class="score-val" id="high-score-val" style="font-size: 2.2rem; color: #666;">0</span></div>
    <button class="btn" style="width: 200px; margin-top: 40px; border: 2px solid #000; border-radius: 8px;" id="btn-restart">RETRY</button>
</div>

<script>
const questionBank = [
    { number: 1769, p: 29, q: 61 },
    { number: 1457, p: 31, q: 47 },
    { number: 2491, p: 47, q: 53 },
    { number: 4087, p: 61, q: 67 },
    { number: 2173, p: 41, q: 53 }
];

let gameQuestions = [];
let currentIdx = 0;
let totalScore = 0;
let currentPot = 10000;
let timerInterval;
let inputDigits = ['0', '0'];
let pressCount = 0;

let isGameStarted = false; 
let isWaitingNext = false;  
let isSkipped = false; 
let remainingFactor = null;

const keyboard = document.getElementById('keyboard');
const problemBox = document.getElementById('problem-box');
const inputDisplay = document.getElementById('display-input');
const startEvent = ('ontouchstart' in window) ? 'touchstart' : 'mousedown';

keyboard.addEventListener(startEvent, function(e) {
    const target = e.target.closest('button');
    if (!target) return;
    
    e.preventDefault();
    
    target.classList.remove('pop-anime');
    void target.offsetWidth;
    target.classList.add('pop-anime');
    
    const action = target.getAttribute('data-action');
    if (!action) return;
    
    if (action === 'back') pressBack();
    else if (action === 'comma') pressComma();
    else if (action === 'p') pressP();
    else pressNum(action);
});

keyboard.addEventListener('animationend', function(e) {
    if (e.target.tagName === 'BUTTON') {
        e.target.classList.remove('pop-anime');
    }
});

// アニメーションクラスを自動でクリーンアップする仕掛け
problemBox.addEventListener('animationend', () => problemBox.classList.remove('correct-anime'));
inputDisplay.addEventListener('animationend', () => inputDisplay.classList.remove('flash-anime'));

document.getElementById('btn-restart').addEventListener(startEvent, function(e) {
    e.preventDefault();
    const target = e.target;
    target.classList.remove('pop-anime');
    void target.offsetWidth;
    target.classList.add('pop-anime');
    setTimeout(restartGame, 100);
});

function initGame() {
    gameQuestions = [...questionBank].sort(() => 0.5 - Math.random()).slice(0, 10);
    currentIdx = 0;
    totalScore = 0;
    isGameStarted = false;
    isWaitingNext = false;
    isSkipped = false;
    inputDigits = ['0', '0'];
    pressCount = 0;
    remainingFactor = null;
    
    document.getElementById('q-num').innerText = "1";
    document.getElementById('display-sub').innerText = "";
    document.getElementById('display-main').innerText = "PRESS P";
    
    problemBox.className = "problem-container ready-mode";
    updateInputDisplay();
}

function startFirstQuestion() {
    isGameStarted = true;
    showQuestion();
}

function showQuestion() {
    if (currentIdx >= gameQuestions.length) {
        clearInterval(timerInterval);
        showResult();
        return;
    }
    
    isWaitingNext = false;
    isSkipped = false;
    inputDigits = ['0', '0'];
    pressCount = 0;
    remainingFactor = null;
    document.getElementById('q-num').innerText = currentIdx + 1;
    
    problemBox.className = "problem-container";
    
    const currentQ = gameQuestions[currentIdx];
    document.getElementById('display-sub').innerText = currentQ.number;
    document.getElementById('display-main').innerText = currentQ.number;
    
    updateInputDisplay();
    
    currentPot = 10000;
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        if (currentPot > 1000) {
            currentPot -= 25; 
        }
    }, 50);
}

function updateInputDisplay() {
    inputDisplay.innerText = inputDigits.join('');
}

// 🚀 正解演出を発火させる関数
function triggerCorrectEffects() {
    // お題箱のアニメーション適用
    problemBox.classList.remove('correct-anime');
    void problemBox.offsetWidth;
    problemBox.classList.add('correct-anime');

    // 入力エリアのアニメーション適用
    inputDisplay.classList.remove('flash-anime');
    void inputDisplay.offsetWidth;
    inputDisplay.classList.add('flash-anime');
}

function pressNum(numStr) {
    if (!isGameStarted) return;

    inputDigits = [inputDigits[1], numStr];
    pressCount++;
    updateInputDisplay();

    if (pressCount >= 2) {
        if (isWaitingNext) {
            checkAnswerB();
        } else {
            checkAnswerA();
        }
    }
}

function pressComma() {
    if (!isGameStarted) return;

    if (inputDigits[1] === ',') {
        triggerPass();
        return;
    }

    inputDigits = [inputDigits[1], ','];
    pressCount++;
    updateInputDisplay();

    if (inputDigits[0] === ',' && inputDigits[1] === ',') {
        triggerPass();
    }
}

function triggerPass() {
    if (isWaitingNext) {
        currentIdx++;
        showQuestion();
        return;
    }

    inputDigits = ['0', '0'];
    pressCount = 0;
    updateInputDisplay();
    triggerCorrectEffects(); // パス時も演出を入れる

    const currentQ = gameQuestions[currentIdx];
    document.getElementById('display-sub').innerText = `${currentQ.number} =`;
    document.getElementById('display-main').innerText = `${currentQ.p} × ${currentQ.q}`;
    
    problemBox.className = "problem-container skipped-mode";
    
    isWaitingNext = true;
    isSkipped = true;
}

function checkAnswerA() {
    if (inputDigits[0] !== ',' && inputDigits[1] !== ',') {
        const playerAns = parseInt(inputDigits.join(''));
        const currentQ = gameQuestions[currentIdx];
        
        if (playerAns === currentQ.p || playerAns === currentQ.q) {
            totalScore += currentPot;
            remainingFactor = (playerAns === currentQ.p) ? currentQ.q : currentQ.p;
            
            document.getElementById('display-sub').innerText = `${currentQ.number} = ${playerAns} ×`;
            document.getElementById('display-main').innerText = remainingFactor;
            
            problemBox.className = "problem-container";
            
            triggerCorrectEffects(); // 🚀 正解エフェクトON！
            isWaitingNext = true;
        }
        
        inputDigits = ['0', '0'];
        pressCount = 0;
        updateInputDisplay(); 
    }
}

function checkAnswerB() {
    if (isSkipped) return;

    if (inputDigits[0] !== ',' && inputDigits[1] !== ',') {
        const playerAns = parseInt(inputDigits.join(''));
        
        if (playerAns === remainingFactor) {
            triggerCorrectEffects(); // 🚀 2つ目正解時もON！
            currentIdx++;
            // アニメーションの余韻を少しだけ感じさせてから次へ（違和感があれば即時でもOK）
            setTimeout(showQuestion, 80);
        } else {
            inputDigits = ['0', '0'];
            pressCount = 0;
            updateInputDisplay();
        }
    }
}

function pressBack() {
    if (!isGameStarted) return;
    inputDigits = ['0', inputDigits[0]];
    if (pressCount > 0) pressCount--;
    updateInputDisplay();
}

function pressP() {
    if (!isGameStarted) {
        startFirstQuestion();
        return;
    }

    if (isWaitingNext) {
        triggerCorrectEffects();
        currentIdx++;
        setTimeout(showQuestion, 80);
    }
}

function showResult() {
    document.getElementById('game-view').style.display = "none";
    document.getElementById('result-view').style.display = "flex";
    
    let highScore = localStorage.getItem('prime_high_score') || 0;
    if (totalScore > highScore) {
        highScore = totalScore;
        localStorage.setItem('prime_high_score', highScore);
    }
    
    document.getElementById('final-score').innerText = totalScore.toLocaleString() + " PTS";
    document.getElementById('high-score-val').innerText = parseInt(highScore).toLocaleString() + " PTS";
}

function restartGame() {
    document.getElementById('result-view').style.display = "none";
    document.getElementById('game-view').style.display = "flex";
    initGame();
}

initGame();
</script>
</body>
</html>
