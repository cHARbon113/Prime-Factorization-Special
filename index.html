<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>素因数分解・特級</title>
    <style>
        * { 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            background: #ffffff;
            color: #000000;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .game-wrapper { 
            width: 100%; 
            max-width: 380px; 
            height: 100%;
            max-height: 680px; 
            padding: 15px 20px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            position: relative;
        }
        
        .header-area { margin-top: 5px; width: 100%; position: relative; }
        .progress { font-size: 1.1rem; text-align: right; color: #666; margin-bottom: 5px; font-weight: 600; }
        
        .problem-container { background: #ffffff; color: #000000; border: 2.5px solid #000; border-radius: 12px; padding: 20px 15px; text-align: center; min-height: 180px; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; position: relative; }
        
        .sub-display { font-size: 1.4rem; color: #666666; min-height: 2rem; margin-bottom: 5px; letter-spacing: 1px; font-weight: 500; }
        .main-display { font-size: 4.2rem; letter-spacing: 1px; line-height: 1.1; font-weight: 600; }
        
        .ready-mode .main-display { font-size: 2.2rem; }
        .skipped-mode .main-display { font-size: 3.2rem; }
        
        .gauge-container { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-top: 12px; overflow: hidden; display: none; }
        .gauge-bar { width: 0%; height: 100%; background: #000000; transition: width 0.1s linear; }
        
        .input-box { font-size: 3.2rem; text-align: center; margin: 8px 0 12px 0; letter-spacing: 6px; border-bottom: 2.5px solid #ccc; padding-bottom: 3px; color: #000; font-weight: 600; min-height: 4.5rem; line-height: 4.5rem; }
        
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; width: 100%; padding-top: 5px; }
        
        .btn { background: #ffffff; color: #000000; border: 2px solid #000000; padding: 16px 0; font-size: 1.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 100%; outline: none; font-weight: 600; border-radius: 8px; }
        .btn-action { background: #dcdcdc; }
        
        .btn:active { background: #000000; color: #ffffff; }
        .btn-action:active { background: #888888; color: #ffffff; }
        
        /* アニメーション */
        .pop-anime { animation: pop 0.12s ease-out; }
        @keyframes pop {
            0% { transform: scale(0.96); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1.0); }
        }
        
        .correct-anime { animation: correct-bounce 0.25s ease-out; }
        @keyframes correct-bounce {
            0% { transform: scale(1.0); }
            40% { transform: scale(1.04); }
            100% { transform: scale(1.0); }
        }
        
        .flash-anime { animation: input-flash 0.15s ease-out; }
        @keyframes input-flash {
            0% { opacity: 0.3; transform: scale(0.95); color: #00dd00; }
            100% { opacity: 1; transform: scale(1.0); color: #000000; }
        }
        
        .wrong-anime { animation: wrong-shake 0.2s ease-in-out; }
        @keyframes wrong-shake {
            0% { transform: translateX(0); color: #ff0000; }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(4px); }
            100% { transform: translateX(0); color: #000000; }
        }
        
        /* リザルト画面 */
        .result-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; z-index: 10; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        
        .huge-display-box { font-size: 2.6rem; font-weight: 600; color: #000000; margin: 12px 0; line-height: 1.2; }
        .huge-display-box span.label { font-size: 1.2rem; color: #000000; font-weight: 600; display: block; margin-bottom: 4px; letter-spacing: 1px; }
        
        .new-record-title { font-size: 2.2rem; font-weight: 600; color: #000000; margin: 15px 0 5px 0; letter-spacing: 0.5px; }
        
        .record-transition { margin: 10px 0 15px 0; font-weight: 500; color: #000000; display: flex; align-items: flex-end; justify-content: center; gap: 8px; }
        .old-score { font-size: 1.4rem; color: #666; padding-bottom: 3px; }
        .new-score { font-size: 2.8rem; font-weight: 600; color: #000000; }
    </style>
</head>
<body>

<div class="game-wrapper" id="game-view">
    <div class="header-area">
        <div class="progress"><span id="q-num">1</span> / 10</div>
        <div class="problem-container ready-mode" id="problem-box">
            <div class="sub-display" id="display-sub"></div>
            <div class="main-display" id="display-main">PRESS P</div>
            <div class="gauge-container" id="gauge-wrap">
                <div class="gauge-bar" id="gauge-fill"></div>
            </div>
        </div>
    </div>
    
    <div>
        <div class="input-box" id="display-input">00</div>
        
        <div class="keypad" id="keyboard">
            <button class="btn btn-action" data-action="back" id="btn-back">◀︎</button>
            <button class="btn btn-action" data-action="comma">,</button>
            <button class="btn btn-action" data-action="p">P</button>

            <button class="btn" data-action="7">7</button>
            <button class="btn" data-action="8">8</button>
            <button class="btn" data-action="9">9</button>

            <button class="btn" data-action="4">4</button>
            <button class="btn" data-action="5">5</button>
            <button class="btn" data-action="6">6</button>

            <button class="btn" data-action="1">1</button>
            <button class="btn" data-action="2">2</button>
            <button class="btn" data-action="3">3</button>
        </div>
    </div>
</div>

<div class="result-screen" id="result-view">
    <div class="huge-display-box" id="result-accuracy">0%</div>
    <div class="huge-display-box"><span class="label">タイム</span><span id="result-time">00:00.00</span></div>
    
    <div id="result-content-area" style="width: 100%;"></div>
    
    <button class="btn" style="width: 200px; margin-top: 35px; border: 2px solid #000; border-radius: 8px;" id="btn-restart">RETRY</button>
</div>

let currentQuestions = [];
let currentQuestionIndex = 0;
let totalScore = 0;
let correctCount = 0;
let currentInput = "";
let isGameActive = false;
let startTime, endTime;

// 長押しスキップ管理
let longPressTimer = null;
let gaugeInterval = null;
let longPressActive = false;

function initGame() {
    // 【修正箇所】桁数による自動仕分けロジック
    const bank2x2 = [];
    const bank2x3 = [];
    
    questionBank.forEach(q => {
        const lenP = q.p.toString().length;
        const lenQ = q.q.toString().length;
        
        if (lenP === 2 && lenQ === 2) {
            bank2x2.push(q);
        } else if ((lenP === 2 && lenQ === 3) || (lenP === 3 && lenQ === 2)) {
            bank2x3.push(q);
        }
    });

    const shuffled2x2 = bank2x2.sort(() => 0.5 - Math.random());
    const shuffled2x3 = bank2x3.sort(() => 0.5 - Math.random());
    
    // 最初6問を2x2桁、残り4問を2x3桁でセット
    currentQuestions = [
        ...shuffled2x2.slice(0, 6),
        ...shuffled2x3.slice(0, 4)
    ];
    
    currentQuestionIndex = 0;
    totalScore = 0;
    correctCount = 0;
    isGameActive = false;
    currentInput = "";
    
    document.getElementById('display-sub').innerText = "";
    document.getElementById('display-main').innerText = "PRESS P";
    document.getElementById('problem-box').className = "problem-container ready-mode";
    document.getElementById('display-input').innerText = "00";
    document.getElementById('q-num').innerText = "1";
    resetGauge();
}

function startGame() {
    isGameActive = true;
    startTime = performance.now();
    showQuestion();
}

function showQuestion() {
    if (currentQuestionIndex >= 10) {
        endGame();
        return;
    }
    
    document.getElementById('q-num').innerText = currentQuestionIndex + 1;
    const q = currentQuestions[currentQuestionIndex];
    
    document.getElementById('display-sub').innerText = "";
    document.getElementById('display-main').innerText = q.number;
    document.getElementById('problem-box').className = "problem-container";
    
    currentInput = "";
    document.getElementById('display-input').innerText = "";
    
    const pBox = document.getElementById('problem-box');
    pBox.classList.remove('pop-anime');
    void pBox.offsetWidth;
    pBox.classList.add('pop-anime');
}

function handleInput(key) {
    if (!isGameActive) {
        if (key === 'p') startGame();
        return;
    }
    
    if (key === 'back') {
        if (currentInput.length > 0) {
            currentInput = currentInput.slice(0, -1);
            updateInputDisplay();
        }
        return;
    }
    
    if (key === 'comma') {
        if (currentInput.length > 0 && !currentInput.includes(',') && currentInput.slice(-1) !== ',') {
            currentInput += ',';
            updateInputDisplay();
        }
        return;
    }
    
    if (key === 'p') return;
    if (currentInput.replace(',', '').length >= 7) return;
    
    currentInput += key;
    updateInputDisplay();
    checkAnswer();
}

function updateInputDisplay() {
    document.getElementById('display-input').innerText = currentInput;
}

function checkAnswer() {
    const parts = currentInput.split(',');
    if (parts.length !== 2) return;
    
    const inputP = parseInt(parts[0]);
    const inputQ = parseInt(parts[1]);
    if (isNaN(inputP) || isNaN(inputQ)) return;
    
    const q = currentQuestions[currentQuestionIndex];
    
    if ((inputP === q.p && inputQ === q.q) || (inputP === q.q && inputQ === q.p)) {
        correctCount++;
        totalScore += 1000; 
        
        const pBox = document.getElementById('problem-box');
        pBox.classList.remove('correct-anime');
        void pBox.offsetWidth;
        pBox.classList.add('correct-anime');
        
        const iBox = document.getElementById('display-input');
        iBox.classList.remove('flash-anime');
        void iBox.offsetWidth;
        iBox.classList.add('flash-anime');
        
        currentQuestionIndex++;
        setTimeout(showQuestion, 250);
    } else {
        const ansLen = (q.p.toString() + q.q.toString()).length;
        if (currentInput.replace(',', '').length >= ansLen) {
            const iBox = document.getElementById('display-input');
            iBox.classList.remove('wrong-anime');
            void iBox.offsetWidth;
            iBox.classList.add('wrong-anime');
        }
    }
}

function skipQuestion() {
    if (!isGameActive) return;
    
    const q = currentQuestions[currentQuestionIndex];
    document.getElementById('display-sub').innerText = `${q.number} =`;
    document.getElementById('display-main').innerText = `${q.p} × ${q.q}`;
    document.getElementById('problem-box').className = "problem-container skipped-mode";
    document.getElementById('display-input').innerText = "PASSED";
    
    currentQuestionIndex++;
    setTimeout(showQuestion, 1600);
}

function formatClearTime(ms) {
    const totalSec = ms / 1000;
    const min = Math.floor(totalSec / 60);
    const sec = Math.floor(totalSec % 60);
    const msec = Math.floor((ms % 1000) / 10);
    return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}.${msec.toString().padStart(2, '0')}`;
}

function endGame() {
    isGameActive = false;
    endTime = performance.now();
    
    document.getElementById('game-view').style.display = "none";
    document.getElementById('result-view').style.display = "flex";
    
    const accuracy = Math.round((correctCount / 10) * 100);
    document.getElementById('result-accuracy').innerText = `${accuracy}%`;
    
    const clearTimeMs = endTime - startTime;
    document.getElementById('result-time').innerText = formatClearTime(clearTimeMs);
    
    const oldHighScore = parseInt(getStorageItem('prime_high_score', '0'));
    const contentArea = document.getElementById('result-content-area');
    
    if (totalScore > oldHighScore) {
        setStorageItem('prime_high_score', totalScore);
        contentArea.innerHTML = `
            <div class="new-record-title">ハイスコアを更新！</div>
            <div class="record-transition">
                <span class="old-score">${oldHighScore.toLocaleString()} →</span>
                <span class="new-score">${totalScore.toLocaleString()}</span>
            </div>
        `;
    } else {
        contentArea.innerHTML = `
            <div class="huge-display-box"><span class="label">スコア</span>${totalScore.toLocaleString()}</div>
            <div class="huge-display-box"><span class="label">ハイスコア</span>${oldHighScore.toLocaleString()}</div>
        `;
    }
}

function restartGame() {
    document.getElementById('result-view').style.display = "none";
    document.getElementById('game-view').style.display = "flex";
    initGame();
}

function resetGauge() {
    if (longPressTimer) clearTimeout(longPressTimer);
    if (gaugeInterval) clearInterval(gaugeInterval);
    document.getElementById('gauge-wrap').style.display = 'none';
    document.getElementById('gauge-fill').style.width = '0%';
    longPressActive = false;
}

function startGauge() {
    if (!isGameActive) return;
    longPressActive = true;
    const gaugeWrap = document.getElementById('gauge-wrap');
    const gaugeFill = document.getElementById('gauge-fill');
    
    gaugeWrap.style.display = 'block';
    gaugeFill.style.width = '0%';
    
    let startTime = Date.now();
    const duration = 800; 
    
    gaugeInterval = setInterval(() => {
        let elapsed = Date.now() - startTime;
        let percent = Math.min((elapsed / duration) * 100, 100);
        gaugeFill.style.width = percent + '%';
        if (percent >= 100) clearInterval(gaugeInterval);
    }, 20);
    
    longPressTimer = setTimeout(() => {
        clearInterval(gaugeInterval);
        gaugeWrap.style.display = 'none';
        skipQuestion();
    }, duration);
}

document.addEventListener('DOMContentLoaded', () => {
    initGame();
    
    const keyboard = document.getElementById('keyboard');
    
    keyboard.addEventListener('touchstart', (e) => {
        const btn = e.target.closest('.btn');
        if (!btn) return;
        e.preventDefault();
        
        const action = btn.getAttribute('data-action');
        if (action === 'p') {
            startGauge();
        } else {
            handleInput(action);
        }
    }, { passive: false });
    
    keyboard.addEventListener('touchend', (e) => {
        const btn = e.target.closest('.btn');
        if (!btn) return;
        const action = btn.getAttribute('data-action');
        if (action === 'p') {
            if (longPressActive && !isGameActive) {
                handleInput('p');
            }
            resetGauge();
        }
    });
    
    keyboard.addEventListener('touchcancel', resetGauge);
    
    keyboard.addEventListener('mousedown', (e) => {
        const btn = e.target.closest('.btn');
        if (!btn) return;
        const action = btn.getAttribute('data-action');
        if (action === 'p') {
            startGauge();
        } else {
            handleInput(action);
        }
    });
    
    keyboard.addEventListener('mouseup', (e) => {
        const btn = e.target.closest('.btn');
        if (!btn) return;
        const action = btn.getAttribute('data-action');
        if (action === 'p') {
            if (longPressActive && !isGameActive) {
                handleInput('p');
            }
            resetGauge();
        }
    });
    
    keyboard.addEventListener('mouseleave', resetGauge);
    document.getElementById('btn-restart').addEventListener('click', restartGame);
});
</script>
