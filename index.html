<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>素因数分解・特級</title>
    <style>
        * { 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            background: #ffffff;
            color: #000000;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .game-wrapper { 
            width: 100%; 
            max-width: 380px; 
            height: 100%;
            max-height: 680px; 
            padding: 15px 20px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            position: relative;
        }
        
        .header-area { margin-top: 5px; width: 100%; position: relative; }
        .progress { font-size: 1.1rem; text-align: right; color: #666; margin-bottom: 5px; font-weight: 600; }
        
        .problem-container { background: #ffffff; color: #000000; border: 2.5px solid #000; border-radius: 12px; padding: 20px 15px; text-align: center; min-height: 180px; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; position: relative; }
        
        .sub-display { font-size: 1.4rem; color: #666666; min-height: 2rem; margin-bottom: 5px; letter-spacing: 1px; font-weight: 500; }
        .main-display { font-size: 4.2rem; letter-spacing: 1px; line-height: 1.1; font-weight: 600; }
        
        .ready-mode .main-display { font-size: 2.2rem; }
        .skipped-mode .main-display { font-size: 3.2rem; }
        
        .gauge-container {
            width: 100%;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin-top: 12px;
            overflow: hidden;
            display: none;
        }
        .gauge-bar {
            width: 0%;
            height: 100%;
            background: #000000;
            transition: width 0.1s linear;
        }
        
        .input-box { font-size: 3.2rem; text-align: center; margin: 8px 0 12px 0; letter-spacing: 6px; border-bottom: 2.5px solid #ccc; padding-bottom: 3px; color: #000; font-weight: 600; min-height: 4.5rem; line-height: 4.5rem; }
        
        .keypad { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 6px; 
            width: 100%; 
            padding-top: 5px;
        }
        
        .btn { 
            background: #ffffff; 
            color: #000000; 
            border: 2px solid #000000; 
            padding: 16px 0; 
            font-size: 1.8rem; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            outline: none; 
            font-weight: 600; 
            border-radius: 8px; 
        }
        .btn-action { background: #dcdcdc; }
        
        .btn:active { background: #000000; color: #ffffff; }
        .btn-action:active { background: #888888; color: #ffffff; }
        
        /* アニメーション */
        .pop-anime { animation: pop 0.12s ease-out; }
        @keyframes pop {
            0% { transform: scale(0.96); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1.0); }
        }
        
        .correct-anime { animation: correct-bounce 0.25s ease-out; }
        @keyframes correct-bounce {
            0% { transform: scale(1.0); }
            40% { transform: scale(1.04); }
            100% { transform: scale(1.0); }
        }
        
        .flash-anime { animation: input-flash 0.15s ease-out; }
        @keyframes input-flash {
            0% { opacity: 0.3; transform: scale(0.95); color: #00dd00; }
            100% { opacity: 1; transform: scale(1.0); color: #000000; }
        }
        
        .wrong-anime { animation: wrong-shake 0.2s ease-in-out; }
        @keyframes wrong-shake {
            0% { transform: translateX(0); color: #ff0000; }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(4px); }
            100% { transform: translateX(0); color: #000000; }
        }
        
        /* リザルト画面 */
        .result-screen { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #ffffff; 
            z-index: 10; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            text-align: center; 
        }
        
        .huge-display-box { 
            font-size: 2.6rem; 
            font-weight: 600; 
            color: #000000; 
            margin: 12px 0; 
            line-height: 1.2; 
        }
        .huge-display-box span.label { 
            font-size: 1.2rem; 
            color: #000000; 
            font-weight: 600; 
            display: block; 
            margin-bottom: 4px; 
            letter-spacing: 1px; 
        }
        
        .new-record-title { font-size: 2.2rem; font-weight: 600; color: #000000; margin: 15px 0 5px 0; letter-spacing: 0.5px; }
        
        .record-transition { margin: 10px 0 15px 0; font-weight: 500; color: #000000; display: flex; align-items: flex-end; justify-content: center; gap: 8px; }
        .old-score { font-size: 1.4rem; color: #666; padding-bottom: 3px; }
        .new-score { font-size: 2.8rem; font-weight: 600; color: #000000; }
    </style>
</head>
<body>

<div class="game-wrapper" id="game-view">
    <div class="header-area">
        <div class="progress"><span id="q-num">1</span> / 10</div>
        <div class="problem-container ready-mode" id="problem-box">
            <div class="sub-display" id="display-sub"></div>
            <div class="main-display" id="display-main">PRESS P</div>
            
            <div class="gauge-container" id="gauge-wrap">
                <div class="gauge-bar" id="gauge-fill"></div>
            </div>
        </div>
    </div>
    
    <div>
        <div class="input-box" id="display-input">00</div>
        
        <div class="keypad" id="keyboard">
            <button class="btn btn-action" data-action="back" id="btn-back">◀︎</button>
            <button class="btn btn-action" data-action="comma">,</button>
            <button class="btn btn-action" data-action="p">P</button>

            <button class="btn" data-action="7">7</button>
            <button class="btn" data-action="8">8</button>
            <button class="btn" data-action="9">9</button>

            <button class="btn" data-action="4">4</button>
            <button class="btn" data-action="5">5</button>
            <button class="btn" data-action="6">6</button>

            <button class="btn" data-action="1">1</button>
            <button class="btn" data-action="2">2</button>
            <button class="btn" data-action="3">3</button>
        </div>
    </div>
</div>

<div class="result-screen" id="result-view">
    <div class="huge-display-box" id="result-accuracy">0%</div>
    <div class="huge-display-box"><span class="label">タイム</span><span id="result-time">00:00.00</span></div>
    
    <div id="result-content-area" style="width: 100%;"></div>
    
    <button class="btn" style="width: 200px; margin-top: 35px; border: 2px solid #000; border-radius: 8px;" id="btn-restart">RETRY</button>
</div>

<script>
function getStorageItem(key, fallback) {
    try {
        const val = localStorage.getItem(key);
        return val !== null ? val : fallback;
    } catch (e) { return fallback; }
}
function setStorageItem(key, value) {
    try { localStorage.setItem(key, value); } catch (e) {}
}

const questionBank = [
    { number: 1769, p: 29, q: 61 },
    { number: 1457, p: 31, q: 47 },
    { number: 2491, p: 47, q: 53 },
    { number: 4087, p: 61, q: 67 },
    { number: 2173, p: 41, q: 53 }
];

let gameQuestions = [];
let currentIdx = 0;
let totalScore = 0;
let correctCount = 0; 
let inputDigits = ['0', '0'];
let pressCount = 0;

let isGameStarted = false; 
let isWaitingNext = false;  
let isSkipped = false; 
let remainingFactor = null;
let hasMissedCurrentQuestion = false;

let questionStartTime = 0; 
let currentMissCount = 0;   

let startTime = 0;
let endTime = 0;

let longPressTimer = null;
let gaugeInterval = null;
let longPressStartTime = 0;
const REQUIRED_PRESS_TIME = 5000; 

const problemBox = document.getElementById('problem-box');
const inputDisplay = document.getElementById('display-input');
const backButton = document.getElementById('btn-back');
const startEvent = ('ontouchstart' in window) ? 'touchstart' : 'mousedown';
const endEvent = ('ontouchstart' in window) ? 'touchend' : 'mouseup';

document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

// 🚀 マルチタッチ対応・物理タッチ時刻最優先記録
document.querySelectorAll('.keypad .btn').forEach(button => {
    button.addEventListener(startEvent, function(e) {
        e.preventDefault();
        e.stopPropagation(); 
        
        const clickTime = performance.now(); // ★ タッチした瞬間を精密に記録
        
        this.classList.remove('pop-anime');
        void this.offsetWidth;
        this.classList.add('pop-anime');
        
        const action = this.getAttribute('data-action');
        if (!action) return;
        
        setTimeout(() => {
            if (action === 'back') pressBack();
            else if (action === 'comma') pressComma();
            else if (action === 'p') pressP();
            else pressNum(action, clickTime); // 物理時刻を伝播
        }, 0);
    });
});

backButton.addEventListener(startEvent, function(e) {
    if (isGameStarted) return;
    e.preventDefault();
    
    document.getElementById('gauge-wrap').style.display = 'block';
    longPressStartTime = performance.now();
    
    gaugeInterval = setInterval(() => {
        const elapsed = performance.now() - longPressStartTime;
        const percent = Math.min((elapsed / REQUIRED_PRESS_TIME) * 100, 100);
        document.getElementById('gauge-fill').style.width = `${percent}%`;
    }, 100);

    longPressTimer = setTimeout(() => {
        clearInterval(gaugeInterval);
        document.getElementById('gauge-fill').style.width = '100%';
        
        setTimeout(() => {
            resetGauge();
            if (confirm('ハイスコアをリセットしますか？')) {
                setStorageItem('prime_high_score', 0);
                alert('ハイスコアをリセットしました');
            }
        }, 50);
    }, REQUIRED_PRESS_TIME);
});

backButton.addEventListener(endEvent, resetGauge);
backButton.addEventListener('touchcancel', resetGauge);
backButton.addEventListener('mouseleave', resetGauge);

document.querySelectorAll('.keypad .btn').forEach(btn => {
    btn.addEventListener('animationend', function(e) {
        this.classList.remove('pop-anime');
    });
});

problemBox.addEventListener('animationend', () => problemBox.classList.remove('correct-anime'));
inputDisplay.addEventListener('animationend', () => {
    inputDisplay.classList.remove('flash-anime', 'wrong-anime');
});
document.getElementById('btn-restart').addEventListener(startEvent, function(e) {
    e.preventDefault();
    setTimeout(restartGame, 100);
});

function initGame() {
    gameQuestions = [...questionBank].sort(() => 0.5 - Math.random()).slice(0, 10);
    currentIdx = 0;
    totalScore = 0;
    correctCount = 0;
    isGameStarted = false;
    isWaitingNext = false;
    isSkipped = false;
    inputDigits = ['0', '0'];
    pressCount = 0;
    remainingFactor = null;
    hasMissedCurrentQuestion = false;
    currentMissCount = 0;
    
    document.getElementById('q-num').innerText = "1";
    document.getElementById('display-sub').innerText = "";
    document.getElementById('display-main').innerText = "PRESS P";
    
    problemBox.className = "problem-container ready-mode";
    updateInputDisplay();
    resetGauge();
}

function startFirstQuestion() {
    isGameStarted = true;
    startTime = performance.now(); 
    
    isWaitingNext = false; 
    isSkipped = false;
    inputDigits = ['0', '0'];
    pressCount = 0;
    questionStartTime = performance.now(); 
    
    showQuestion(); 
}

function showQuestion() {
    if (currentIdx >= gameQuestions.length) {
        endTime = performance.now(); 
        showResult();
        return;
    }
    
    isWaitingNext = false;
    isSkipped = false;
    inputDigits = ['0', '0'];
    pressCount = 0;
    remainingFactor = null;
    hasMissedCurrentQuestion = false;
    currentMissCount = 0; 
    document.getElementById('q-num').innerText = currentIdx + 1;
    
    problemBox.className = "problem-container";
    
    const currentQ = gameQuestions[currentIdx];
    document.getElementById('display-sub').innerText = currentQ.number;
    document.getElementById('display-main').innerText = currentQ.number;
    
    updateInputDisplay();
}

function updateInputDisplay() {
    inputDisplay.innerText = inputDigits.join('');
}

function triggerCorrectEffects() {
    problemBox.classList.remove('correct-anime');
    void problemBox.offsetWidth;
    problemBox.classList.add('correct-anime');

    inputDisplay.classList.remove('flash-anime', 'wrong-anime');
    void inputDisplay.offsetWidth;
    inputDisplay.classList.add('flash-anime');
}

function triggerWrongEffects() {
    inputDisplay.classList.remove('flash-anime', 'wrong-anime');
    void inputDisplay.offsetWidth; 
    inputDisplay.classList.add('wrong-anime');
}

function calculateAndAddScore(clickTime) {
    const s = (clickTime - questionStartTime) / 1000; 
    const n = currentMissCount;                  
    
    // スコア計算式自体は完全正常（sが1秒未満ならきれいに9000点以上になる）
    const score = 10000 / ((s / 9 + 1) * (5 * n + 1));
    totalScore += Math.round(score);
}

function pressNum(numStr, clickTime) {
    if (!isGameStarted) return;

    inputDigits = [inputDigits[1], numStr];
    pressCount++;
    updateInputDisplay();

    if (pressCount >= 2) {
        // 🚀 引数clickTimeを確実に引き渡してBの精密判定を行うように修正
        if (isWaitingNext) checkAnswerB(clickTime); 
        else checkAnswerA();
    }
}

function pressComma() {
    if (!isGameStarted) return;

    inputDigits = [inputDigits[1], ','];
    pressCount++;
    updateInputDisplay();

    if (pressCount >= 2) {
        if (inputDigits[0] === ',' && inputDigits[1] === ',') {
            triggerPass();
        } else {
            if (isWaitingNext) checkAnswerB(performance.now());
            else checkAnswerA();
        }
    }
}

function triggerPass() {
    if (isWaitingNext) {
        currentIdx++;
        showQuestion();
        return;
    }

    hasMissedCurrentQuestion = true;
    triggerWrongEffects();

    inputDigits = ['0', '0'];
    pressCount = 0;
    updateInputDisplay();

    const currentQ = gameQuestions[currentIdx];
    document.getElementById('display-sub').innerText = `${currentQ.number} =`;
    document.getElementById('display-main').innerText = `${currentQ.p} × ${currentQ.q}`;
    
    problemBox.className = "problem-container skipped-mode";
    
    isWaitingNext = true;
    isSkipped = true;
}

function checkAnswerA() {
    if (inputDigits[0] !== ',' && inputDigits[1] !== ',') {
        const playerAns = parseInt(inputDigits.join(''));
        const currentQ = gameQuestions[currentIdx];
        
        if (playerAns === currentQ.p || playerAns === currentQ.q) {
            remainingFactor = (playerAns === currentQ.p) ? currentQ.q : currentQ.p;
            
            document.getElementById('display-sub').innerText = `${currentQ.number} = ${playerAns} ×`;
            document.getElementById('display-main').innerText = remainingFactor;
            
            problemBox.className = "problem-container";
            
            triggerCorrectEffects();
            isWaitingNext = true;
            
            inputDigits = ['0', '0'];
            pressCount = 0;
            updateInputDisplay(); 
        } else {
            hasMissedCurrentQuestion = true;
            currentMissCount++;
            triggerWrongEffects();
            inputDigits = ['0', '0'];
            pressCount = 0;
            updateInputDisplay();
        }
    } else {
        hasMissedCurrentQuestion = true;
        currentMissCount++;
        triggerWrongEffects();
        inputDigits = ['0', '0'];
        pressCount = 0;
        updateInputDisplay();
    }
}

// 🚀 正しく物理タッチ時刻(clickTime)を受け取ってスコア関数へ直結
function checkAnswerB(clickTime) {
    if (isSkipped) return;

    if (inputDigits[0] !== ',' && inputDigits[1] !== ',') {
        const playerAns = parseInt(inputDigits.join(''));
        
        if (playerAns === remainingFactor) {
            if (!hasMissedCurrentQuestion) {
                correctCount++;
            }
            calculateAndAddScore(clickTime); // ★物理時刻を直接渡す！
            triggerCorrectEffects();
            
            currentIdx++;
            showQuestion(); 
        } else {
            hasMissedCurrentQuestion = true;
            currentMissCount++;
            triggerWrongEffects();
            inputDigits = ['0', '0'];
            pressCount = 0;
            updateInputDisplay();
        }
    } else {
        hasMissedCurrentQuestion = true;
        currentMissCount++;
        triggerWrongEffects();
        inputDigits = ['0', '0'];
        pressCount = 0;
        updateInputDisplay();
    }
}

function pressBack() {
    if (!isGameStarted) return;
    
    inputDigits = ['0', inputDigits[0]];
    if (pressCount > 0) pressCount--;
    updateInputDisplay();
}

function pressP() {
    if (!isGameStarted) {
        startFirstQuestion();
        return; 
    }

    if (isWaitingNext && !isSkipped) {
        triggerCorrectEffects();
        currentIdx++;
        // 🚀 画面を切り替える『前』に、次の問題の精密タイマーをジャストで起動させる
        questionStartTime = performance.now(); 
        showQuestion();
    }
}

function formatClearTime(ms) {
    const totalSeconds = ms / 1000;
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = Math.floor(totalSeconds % 60);
    const milliseconds = Math.floor((ms % 1000) / 10);
    return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${String(milliseconds).padStart(2, '0')}`;
}

function showResult() {
    document.getElementById('game-view').style.display = "none";
    document.getElementById('result-view').style.display = "flex";
    
    const accuracy = (correctCount / gameQuestions.length) * 100;
    document.getElementById('result-accuracy').innerText = `${accuracy}%`;
    
    const clearTimeMs = endTime - startTime;
    document.getElementById('result-time').innerText = formatClearTime(clearTimeMs);
    
    const oldHighScore = parseInt(getStorageItem('prime_high_score', '0'));
    const contentArea = document.getElementById('result-content-area');
    
    if (totalScore > oldHighScore) {
        setStorageItem('prime_high_score', totalScore);
        contentArea.innerHTML = `
            <div class="new-record-title">ハイスコアを更新！</div>
            <div class="record-transition">
                <span class="old-score">${oldHighScore.toLocaleString()} →</span>
                <span class="new-score">${totalScore.toLocaleString()}</span>
            </div>
        `;
    } else {
        contentArea.innerHTML = `
            <div class="huge-display-box"><span class="label">スコア</span>${totalScore.toLocaleString()}</div>
            <div class="huge-display-box"><span class="label">ハイスコア</span>${oldHighScore.toLocaleString()}</div>
        `;
    }
}

function restartGame() {
    document.getElementById('result-view').style.display = "none";
    document.getElementById('game-view').style.display = "flex";
    initGame();
}

function resetGauge() {
    if (longPressTimer) clearTimeout(longPressTimer);
    if (gaugeInterval) clearInterval(gaugeInterval);
    document.getElementById('gauge-wrap').style.display = 'none';
    document.getElementById('gauge-fill').style.width = '0%';
}

initGame();
</script>
</body>
</html>
